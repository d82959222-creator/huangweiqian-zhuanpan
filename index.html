<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>黄维倩请翻牌子</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a16 100%);
    font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.8); opacity: 0; }
  }

  .title {
    position: relative;
    z-index: 2;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ff1744, #ff9100, #ffea00, #00e676, #00e5ff, #2979ff, #d500f9);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    25%     { background-position: 100% 0%; }
    50%     { background-position: 100% 100%; }
    75%     { background-position: 0% 100%; }
  }

  .wheel-container {
    position: relative;
    z-index: 2;
    width: 560px;
    height: 560px;
  }

  .pointer {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0;
    height: 0;
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-top: 56px solid #ff1744;
    filter: drop-shadow(0 4px 12px rgba(255,23,68,0.7));
    transition: transform 0.1s;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -66px;
    left: -12px;
    width: 24px;
    height: 24px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 48px rgba(255,23,68,0.5);
  }

  canvas {
    display: block;
    border-radius: 50%;
    box-shadow:
      0 0 60px rgba(255,255,255,0.2),
      0 0 120px rgba(255,255,255,0.08),
      0 20px 80px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: filter 0.3s, transform 0.15s;
  }
  canvas:hover { filter: brightness(1.08); }
  canvas:active { filter: brightness(0.95); transform: scale(0.98); }

  .center-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #fff, #e8e8e8);
    border: 5px solid #ff1744;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.6), 0 0 30px rgba(255,23,68,0.3);
    cursor: pointer;
    font-size: 20px;
    font-weight: 900;
    color: #ff1744;
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .center-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 8px 36px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.6), 0 0 50px rgba(255,23,68,0.5);
  }
  .center-btn:active { transform: translate(-50%, -50%) scale(0.93); }
  .center-btn.spinning { pointer-events: none; opacity: 0.6; }

  /* ===== 结果弹窗 ===== */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  .overlay.hidden { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .result-card {
    background: linear-gradient(145deg, #1a1a38, #2c2c50);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 28px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 120px rgba(255,215,0,0.2);
    animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 440px;
    width: 90%;
  }
  @keyframes popIn {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .result-card .icon {
    font-size: 60px;
    margin-bottom: 8px;
    animation: bounceIcon 0.5s ease infinite alternate;
  }
  @keyframes bounceIcon {
    from { transform: translateY(0); }
    to   { transform: translateY(-14px); }
  }

  .result-card .label {
    font-size: 16px;
    color: #bbb;
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  /* 照片 */
  .result-photo {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ffd700;
    box-shadow: 0 0 40px rgba(255,215,0,0.5), 0 8px 30px rgba(0,0,0,0.4);
    margin: 12px auto;
    display: block;
    background: #1a1a35;
  }
  .result-photo.loading {
    animation: photoShimmer 1.5s ease-in-out infinite;
  }
  @keyframes photoShimmer {
    0%,100% { border-color: #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.3); }
    50%     { border-color: #fff;    box-shadow: 0 0 60px rgba(255,215,0,0.7); }
  }

  .result-card .weapon {
    font-size: 34px;
    font-weight: 900;
    color: #ffd700;
    letter-spacing: 4px;
    margin: 12px 0 28px;
    text-shadow: 0 0 30px rgba(255,215,0,0.6);
  }

  .result-card .spin-btn {
    padding: 14px 52px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #ff1744, #d50000);
    box-shadow: 0 10px 36px rgba(255,23,68,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .result-card .spin-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 14px 48px rgba(255,23,68,0.7);
  }
  .result-card .spin-btn:active { transform: scale(0.95); }

  .result-card .exit-btn {
    margin-top: 16px;
    display: block;
    width: 100%;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: none;
    color: #ccc;
    font-size: 16px;
    padding: 12px 52px;
    border-radius: 40px;
    cursor: pointer;
    letter-spacing: 3px;
    transition: background 0.2s;
  }
  .result-card .exit-btn:hover { background: rgba(255,255,255,0.1); }

  .hint {
    position: relative;
    z-index: 2;
    margin-top: 20px;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    letter-spacing: 4px;
  }

  .share-link {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .share-link a {
    color: #64b5f6;
    text-decoration: none;
    word-break: break-all;
  }
  .share-link a:hover { color: #90caf9; text-decoration: underline; }
  .copy-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #ccc;
    padding: 4px 12px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.2); }
  .copied-msg { color: #4caf50; font-size: 12px; display: none; }
  .copied-msg.show { display: inline; }

  @media (max-width: 600px) {
    .title { font-size: 26px; letter-spacing: 4px; margin-bottom: 12px; }
    .wheel-container { width: 92vw; height: 92vw; }
    canvas { width: 92vw; height: 92vw; }
    .center-btn { width: 64px; height: 64px; font-size: 16px; border-width: 4px; }
    .pointer { top: -22px; border-left-width: 16px; border-right-width: 16px; border-top-width: 38px; }
    .pointer::after { top: -46px; left: -8px; width: 16px; height: 16px; }
    .hint { font-size: 12px; }
    .result-photo { width: 140px; height: 140px; }
    .result-card .weapon { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="title">黄维倩请翻牌子</div>

<div class="wheel-container" id="wheelContainer">
  <div class="pointer" id="pointer"></div>
  <canvas id="wheelCanvas" width="560" height="560"></canvas>
  <button class="center-btn" id="centerBtn" title="点击开始翻牌">翻</button>
</div>

<div class="hint">↑ 点击转盘或中间按钮开始 ↑</div>

<div class="share-link" id="shareLink">
  📎 分享链接：<a href="https://d82959222-creator.github.io/huangweiqian-zhuanpan/" target="_blank">d82959222-creator.github.io/huangweiqian-zhuanpan</a>
  <button class="copy-btn" id="copyBtn" title="复制链接">📋 复制</button>
  <span class="copied-msg" id="copiedMsg">✅ 已复制！</span>
</div>

<!-- 结果弹窗 -->
<div class="overlay hidden" id="overlay">
  <div class="result-card">
    <div class="icon">🎯</div>
    <div class="label">恭 喜 翻 到</div>
    <img class="result-photo loading" id="resultPhoto" src="" alt="照片" >
    <div class="weapon" id="resultName"></div>
    <button class="spin-btn" id="spinAgain">🔄 再翻一次</button>
    <button class="exit-btn" id="exitBtn">✕ 退 出</button>
  </div>
</div>

<script>
(function() {
  // ========== 10 位男星 ==========
  const items = [
    '肖战',
    '王一博',
    '杨洋',
    '王鹤棣',
    '吴磊',
    '李现',
    '任嘉伦',
    '宋威龙',
    '龚俊',
    '张凌赫'
  ];

  // ========== 对应照片 ==========
  // 替换方法：浏览器打开 baike.baidu.com 搜明星名 -> 右键头像 -> 复制图片地址 -> 替换下面URL
  const photos = {
    '肖战':   'https://pics5.baidu.com/feed/42a98226cffc1e174c027e6c3ae9f212728de9bd.jpeg@f_auto?token=36ebeb6936291e829a6bdde7bd614ff6',
    '王一博': 'https://inews.gtimg.com/om_bt/OTBsbQZSZg_NdS6YkOTFlw4BzKBR7UCw7t6ds5ANSMvEgAA/641',
    '杨洋':   'https://img1.baidu.com/it/u=459407977,3300525126&fm=253&app=138&f=JPEG?w=800&h=1200',
    '王鹤棣': 'https://ww1.sinaimg.cn/mw690/008wEsX4ly1hsvj3odv32j30u013i49p.jpg',
    '吴磊':   'https://img1.baidu.com/it/u=1576884193,1768646729&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1423',
    '李现':   'https://wx4.sinaimg.cn/mw690/007RsMZ1ly1i3pft0ttikj31xg2w6hdv.jpg',
    '任嘉伦': 'https://ww2.sinaimg.cn/mw690/78ceb44fly1i4ss59ck3ej21hb2mtb2b.jpg',
    '宋威龙': 'https://c-ssl.dtstatic.com/uploads/blog/202412/18/0GSomg4ds0pVWxy.thumb.1000_0.jpeg',
    '龚俊':   'https://img0.baidu.com/it/u=1264634234,861828342&fm=253&app=138&f=JPEG?w=500&h=667',
    '张凌赫': 'https://wx1.sinaimg.cn/mw1024/0068t87Mgy1hubcphmvb5j30u018zdjy.jpg'
  };

  const photosBackup = photos;

  // ========== 7 种鲜艳颜色 ==========
  const colors = [
    '#FF1744', '#FF9100', '#FFEA00',
    '#00E676', '#00E5FF', '#2979FF',
    '#D500F9'
  ];

  function getSegmentColor(index) {
    const base = colors[index % colors.length];
    return index % 2 === 0 ? base : darkenColor(base, 0.22);
  }

  function darkenColor(hex, amount) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.max(0, Math.floor((num >> 16) * (1 - amount)));
    const g = Math.max(0, Math.floor(((num >> 8) & 0x00FF) * (1 - amount)));
    const b = Math.max(0, Math.floor((num & 0x0000FF) * (1 - amount)));
    return `rgb(${r},${g},${b})`;
  }

  // ========== DOM ==========
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const centerBtn = document.getElementById('centerBtn');
  const pointer = document.getElementById('pointer');
  const overlay = document.getElementById('overlay');
  const resultName = document.getElementById('resultName');
  const resultPhoto = document.getElementById('resultPhoto');
  const spinAgainBtn = document.getElementById('spinAgain');
  const exitBtn = document.getElementById('exitBtn');
  const wheelContainer = document.getElementById('wheelContainer');

  function getSize() { return wheelContainer.clientWidth || 560; }

  let WIDTH = 560, HEIGHT = 560, CENTER_X = 280, CENTER_Y = 280, RADIUS = 248;
  const SEG_COUNT = items.length;
  const ARC = (2 * Math.PI) / SEG_COUNT;

  let currentAngle = 0;
  let isSpinning = false;
  let animationId = null;

  // ========== 音效引擎（Web Audio API） ==========
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // 播放一次"咔嗒"声（扇区边界通过指针时触发）
  function playTick() {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      // 清脆的咔嗒声：短促的噪声 + 高频正弦波
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1800, t);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.04);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.05);
    } catch(e) { /* 静默处理 */ }
  }

  // 旋转结束的胜利音效
  function playWinSound() {
    if (!audioCtx) return;
    try {
      const t = audioCtx.currentTime;
      const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, t + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.2, t + i * 0.1 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t + i * 0.1);
        osc.stop(t + i * 0.1 + 0.3);
      });
    } catch(e) { /* 静默处理 */ }
  }

  // ========== 响应式 ==========
  function updateDimensions() {
    const size = getSize();
    if (canvas.width !== size) {
      canvas.width = size; canvas.height = size;
      WIDTH = size; HEIGHT = size;
      CENTER_X = size / 2; CENTER_Y = size / 2;
      RADIUS = size * 0.443;
    }
  }

  // ========== 绘制转盘 ==========
  function drawWheel(angle) {
    updateDimensions();
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    // 外圈金色装饰环
    const outerGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, RADIUS + 6, CENTER_X, CENTER_Y, RADIUS + 20);
    outerGrad.addColorStop(0, '#ffd700');
    outerGrad.addColorStop(0.5, '#ffaa00');
    outerGrad.addColorStop(1, '#cc8800');
    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, RADIUS + 18, 0, 2 * Math.PI);
    ctx.fillStyle = outerGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // 灯泡
    const bulbCount = 48;
    for (let i = 0; i < bulbCount; i++) {
      const ba = (i / bulbCount) * 2 * Math.PI;
      const bx = CENTER_X + (RADIUS + 16) * Math.cos(ba);
      const by = CENTER_Y + (RADIUS + 16) * Math.sin(ba);
      const bright = Math.sin(Date.now() / 250 + i * 0.6) * 0.4 + 0.6;
      ctx.beginPath();
      ctx.arc(bx, by, 4.5, 0, 2 * Math.PI);
      ctx.fillStyle = `rgba(255,255,220,${bright})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx, by, 7, 0, 2 * Math.PI);
      ctx.fillStyle = `rgba(255,255,200,${bright * 0.3})`;
      ctx.fill();
    }

    // 扇区
    for (let i = 0; i < SEG_COUNT; i++) {
      const startAngle = angle + i * ARC;
      const endAngle = startAngle + ARC;
      const midAngle = startAngle + ARC / 2;

      // 填充
      ctx.beginPath();
      ctx.moveTo(CENTER_X, CENTER_Y);
      ctx.arc(CENTER_X, CENTER_Y, RADIUS, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = getSegmentColor(i);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // ===== 文字：从扇角（圆心）向扇弧（外缘）竖排 =====
      const textStartR = RADIUS * 0.20;  // 靠近圆心（扇角）
      const textEndR   = RADIUS * 0.88;  // 靠近外缘（扇弧）
      const textMidR   = (textStartR + textEndR) / 2;

      ctx.save();
      const tx = CENTER_X + textMidR * Math.cos(midAngle);
      const ty = CENTER_Y + textMidR * Math.sin(midAngle);
      ctx.translate(tx, ty);

      const nm = ((midAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      const isFlipped = nm > Math.PI / 2 && nm < 3 * Math.PI / 2;
      ctx.rotate(isFlipped ? midAngle + Math.PI : midAngle);

      const text = items[i];
      const availSpace = textEndR - textStartR;
      const fontSize = Math.floor(Math.min(availSpace / 5, RADIUS * 0.082));
      const charSpacing = fontSize * 1.1;

      ctx.font = `bold ${fontSize}px "Microsoft YaHei", "微软雅黑", "PingFang SC", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const chars = isFlipped ? [...text].reverse() : text;
      const totalH = chars.length * charSpacing;
      const startOff = -totalH / 2 + charSpacing / 2;

      for (let c = 0; c < chars.length; c++) {
        const cy = startOff + c * charSpacing;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillText(chars[c], 1, cy + 1);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(chars[c], 0, cy);
      }
      ctx.restore();
    }

    // 内圈
    const innerGrad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 20, CENTER_X, CENTER_Y, 58);
    innerGrad.addColorStop(0, '#ffffff');
    innerGrad.addColorStop(0.6, '#f0f0f0');
    innerGrad.addColorStop(1, '#cccccc');
    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, 54, 0, 2 * Math.PI);
    ctx.fillStyle = innerGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // ========== 空闲动画 ==========
  function idleAnimate() {
    if (isSpinning) return;
    drawWheel(currentAngle);
    requestAnimationFrame(() => { if (!isSpinning) idleAnimate(); });
  }

  // ========== 旋转 ==========
  let lastTickSeg = -1;

  function spin() {
    if (isSpinning) return;
    initAudio();
    isSpinning = true;
    centerBtn.classList.add('spinning');
    pointer.style.transform = 'translateX(-50%) scale(1.2)';
    lastTickSeg = -1;

    const extraSpins = 5 + Math.random() * 3;
    const randomOffset = Math.random() * 2 * Math.PI;
    const totalRotation = extraSpins * 2 * Math.PI + randomOffset;
    const startAngle = currentAngle;
    const targetAngle = startAngle + totalRotation;
    const startTime = performance.now();
    const duration = 5000;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1.0);
      const eased = 1 - Math.pow(1 - progress, 3.5);

      currentAngle = startAngle + totalRotation * eased;
      drawWheel(currentAngle);

      // 播放咔嗒声：每当扇区边界经过指针时
      const pointerWorldAngle = (currentAngle - Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI);
      const currentSeg = Math.floor(pointerWorldAngle / ARC);
      if (currentSeg !== lastTickSeg) {
        lastTickSeg = currentSeg;
        playTick();
      }

      if (progress < 1.0) {
        animationId = requestAnimationFrame(animate);
      } else {
        currentAngle = targetAngle;
        drawWheel(currentAngle);
        onSpinEnd();
      }
    }

    animationId = requestAnimationFrame(animate);
  }

  // ========== 结果 ==========
  function onSpinEnd() {
    isSpinning = false;
    centerBtn.classList.remove('spinning');
    pointer.style.transform = 'translateX(-50%)';
    playWinSound();

    let pointerAngle = (2 * Math.PI - (currentAngle % (2 * Math.PI)) - Math.PI / 2) % (2 * Math.PI);
    if (pointerAngle < 0) pointerAngle += 2 * Math.PI;
    const winningIndex = Math.floor(pointerAngle / ARC);
    const name = items[winningIndex];

    resultName.textContent = name;

    // 加载照片
    const photoUrl = photos[name];
    
    resultPhoto.classList.add('loading');
    resultPhoto.src = photoUrl;
    resultPhoto.onload = function() {
      resultPhoto.classList.remove('loading');
    };
    resultPhoto.onerror = function() {
      resultPhoto.classList.remove('loading');
      resultPhoto.style.background = '#2a2a4a';
      resultPhoto.alt = name;
    };

    overlay.classList.remove('hidden');
    createCelebration();
  }

  // ========== 庆祝效果 ==========
  function createCelebration() {
    const emojis = ['🎉', '✨', '🌟', '💫', '🎊', '🎯', '🔥', '⚡', '🎆', '💥', '❤️', '💖'];
    for (let i = 0; i < 45; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const dx = (Math.random() - 0.5) * 350;
        const dy = -(100 + Math.random() * 350);
        el.style.cssText = `
          position:fixed;z-index:200;font-size:${22+Math.random()*44}px;
          left:50%;top:40%;pointer-events:none;
          animation:celebPop ${0.7+Math.random()*1.5}s ease-out forwards;
          --dx:${dx}px;--dy:${dy}px;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }, i * 22);
    }
  }

  const celebStyle = document.createElement('style');
  celebStyle.textContent = `
    @keyframes celebPop {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(0deg); opacity:1; }
      50%  { opacity:0.9; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.4) rotate(${Math.random()>0.5?'':'-'}${120+Math.random()*240}deg); opacity:0; }
    }
  `;
  document.head.appendChild(celebStyle);

  // ========== 按钮事件 ==========
  function resetAndSpin() {
    overlay.classList.add('hidden');
    document.querySelectorAll('span[style*="celebPop"]').forEach(el => el.remove());
    setTimeout(() => spin(), 300);
  }

  function exitApp() {
    if (window.close) window.close();
    if (!window.closed) {
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;color:#fff;font-family:'Microsoft YaHei',sans-serif;background:#0a0a16;">
          <div style="font-size:56px;margin-bottom:24px;">👋</div>
          <div style="font-size:26px;letter-spacing:6px;margin-bottom:14px;">感谢参与！</div>
          <div style="color:#888;font-size:14px;">请关闭浏览器页面退出</div>
        </div>
      `;
    }
  }

  // ========== 事件 ==========
  canvas.addEventListener('click', (e) => {
    if (isSpinning) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width / 2;
    const cy = e.clientY - rect.top - rect.height / 2;
    if (Math.sqrt(cx * cx + cy * cy) < RADIUS + 20) spin();
  });

  canvas.addEventListener('touchend', (e) => {
    if (isSpinning) return;
    e.preventDefault();
    spin();
  });

  centerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!isSpinning) spin();
  });

  spinAgainBtn.addEventListener('click', resetAndSpin);
  exitBtn.addEventListener('click', exitApp);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !isSpinning && overlay.classList.contains('hidden')) {
      e.preventDefault(); spin();
    }
    if (e.code === 'Escape') {
      if (!overlay.classList.contains('hidden')) overlay.classList.add('hidden');
      else exitApp();
    }
  });

  // 复制链接
  document.getElementById('copyBtn').addEventListener('click', () => {
    const url = 'https://d82959222-creator.github.io/huangweiqian-zhuanpan/';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 2000);
      });
    }
  });

  // ========== 背景粒子 ==========
  function createBgParticles() {
    const container = document.getElementById('particles');
    const colorArr = ['#ff1744', '#ff9100', '#ffea00', '#00e676', '#00e5ff', '#2979ff', '#d500f9'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      const size = 2 + Math.random() * 7;
      Object.assign(p.style, {
        width: size + 'px', height: size + 'px',
        left: Math.random() * 100 + '%',
        backgroundColor: colorArr[Math.floor(Math.random() * colorArr.length)],
        animationDuration: (5 + Math.random() * 15) + 's',
        animationDelay: Math.random() * 12 + 's',
        boxShadow: `0 0 ${size * 3}px ${p.style.backgroundColor}`
      });
      container.appendChild(p);
    }
  }

  window.addEventListener('resize', () => {
    if (!isSpinning) drawWheel(currentAngle);
  });

  // ========== 启动 ==========
  function init() {
    createBgParticles();
    updateDimensions();
    drawWheel(currentAngle);
    idleAnimate();
  }

  init();
})();
</script>
</body>
</html>
